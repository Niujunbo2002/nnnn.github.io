<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Research roadmap</title>
  <desc id="desc">A research roadmap from perception to multimodal modeling, world interaction, and digital agents, with representative foundation model and world model directions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa4b2" />
    </marker>
    <style>
      .canvas {
        fill: #fbfbfd;
      }

      .rail {
        fill: none;
        stroke: #d9dee7;
        stroke-width: 2.2;
        stroke-linecap: round;
        marker-end: url(#arrow);
      }

      .branch {
        fill: none;
        stroke: #c6ccd6;
        stroke-width: 1.8;
        stroke-linecap: round;
      }

      .node {
        fill: #ffffff;
        stroke: #d7dde6;
        stroke-width: 1.6;
      }

      .node-main {
        stroke: #bac5d4;
      }

      .chip {
        fill: #ffffff;
        stroke-width: 1.4;
      }

      .chip-blue {
        stroke: rgba(39, 110, 241, 0.38);
        fill: rgba(39, 110, 241, 0.07);
      }

      .chip-red {
        stroke: rgba(209, 36, 47, 0.36);
        fill: rgba(209, 36, 47, 0.06);
      }

      .chip-purple {
        stroke: rgba(106, 47, 138, 0.34);
        fill: rgba(155, 89, 182, 0.08);
      }

      .chip-gold {
        stroke: rgba(214, 146, 43, 0.38);
        fill: rgba(214, 146, 43, 0.08);
      }

      .kicker {
        fill: #6a737d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .label {
        fill: #24292f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 24px;
        font-weight: 700;
      }

      .small {
        fill: #57606a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 500;
      }

      .chip-text {
        fill: #24292f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 700;
      }

      .muted {
        fill: #6a737d;
        font-size: 14px;
        font-weight: 500;
      }

      .blue {
        fill: #276ef1;
      }

      .red {
        fill: #d1242f;
      }

      .purple {
        fill: #6a2f8a;
      }

      .gold {
        fill: #8a4b08;
      }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1200" height="420" rx="20" />

  <path class="rail" d="M 145 185 H 1048" />

  <rect class="node node-main" x="58" y="132" width="190" height="106" rx="16" />
  <text class="kicker" x="153" y="165" text-anchor="middle">Input</text>
  <text class="label" x="153" y="198" text-anchor="middle">Perception</text>
  <text class="small" x="153" y="222" text-anchor="middle">visual evidence</text>

  <rect class="node node-main" x="328" y="132" width="235" height="106" rx="16" />
  <text class="kicker" x="445" y="165" text-anchor="middle">Modeling</text>
  <text class="label" x="445" y="198" text-anchor="middle">Multimodal Models</text>
  <text class="small" x="445" y="222" text-anchor="middle">foundation and world models</text>

  <rect class="node node-main" x="650" y="132" width="230" height="106" rx="16" />
  <text class="kicker" x="765" y="165" text-anchor="middle">Environment</text>
  <text class="label" x="765" y="198" text-anchor="middle">World Interaction</text>
  <text class="small" x="765" y="222" text-anchor="middle">digital task spaces</text>

  <rect class="node node-main" x="972" y="132" width="170" height="106" rx="16" />
  <text class="kicker" x="1057" y="165" text-anchor="middle">Action</text>
  <text class="label" x="1057" y="198" text-anchor="middle">Agents</text>
  <text class="small" x="1057" y="222" text-anchor="middle">code and computer use</text>

  <path class="branch" d="M 445 238 V 285" />
  <path class="branch" d="M 765 238 V 285" />
  <path class="branch" d="M 1057 238 V 285" />

  <rect class="chip chip-gold" x="310" y="286" width="190" height="56" rx="12" />
  <text class="chip-text gold" x="405" y="309" text-anchor="middle">M-FM</text>
  <text class="muted" x="405" y="330" text-anchor="middle">document and vision</text>

  <rect class="chip chip-red" x="520" y="286" width="170" height="56" rx="12" />
  <text class="chip-text red" x="605" y="309" text-anchor="middle">V-WM</text>
  <text class="muted" x="605" y="330" text-anchor="middle">video dynamics</text>

  <rect class="chip chip-purple" x="740" y="286" width="170" height="56" rx="12" />
  <text class="chip-text purple" x="825" y="309" text-anchor="middle">LLM Modeling</text>
  <text class="muted" x="825" y="330" text-anchor="middle">diffusion and loops</text>

  <rect class="chip chip-blue" x="930" y="286" width="190" height="56" rx="12" />
  <text class="chip-text blue" x="1025" y="309" text-anchor="middle">Computer Use</text>
  <text class="muted" x="1025" y="330" text-anchor="middle">agents and tools</text>

  <path class="branch" d="M 445 285 C 445 270 405 270 405 286" />
  <path class="branch" d="M 445 285 C 445 270 605 270 605 286" />
  <path class="branch" d="M 765 285 C 765 270 825 270 825 286" />
  <path class="branch" d="M 1057 285 C 1057 270 1025 270 1025 286" />
</svg>
